<!-- @dsCard group="Components" viewport="700x160" name="Stat Cards" subtitle="SG category cards — positive & negative" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--bg-page); padding: 16px; font-family: var(--font-ui); }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }
  .card { border-radius: var(--radius-md); padding: 14px 16px; display: flex; flex-direction: column; gap: 4px; }
  .pos { background: var(--bg-positive); border: 1px solid var(--color-green-700); }
  .neg { background: var(--bg-negative); border: 1px solid var(--color-red-100); }
  .cat { font-size: var(--text-2xs); font-weight: var(--weight-semibold); letter-spacing: var(--tracking-label); text-transform: uppercase; }
  .pos .cat { color: var(--text-positive); opacity: 0.75; }
  .neg .cat { color: var(--text-negative); opacity: 0.75; }
  .val { font-family: var(--font-display); font-size: 38px; font-weight: var(--weight-bold); letter-spacing: var(--tracking-tight); line-height: 1; }
  .pos .val { color: var(--text-positive); }
  .neg .val { color: var(--text-negative); }
  .avg { font-size: var(--text-xs); opacity: 0.7; }
  .pos .avg { color: var(--text-positive); }
  .neg .avg { color: var(--text-negative); }
</style>
</head>
<body>
  <div class="grid">
    <div class="card neg"><div class="cat">Putt</div><div class="val">+0.23</div><div class="avg">AVG +0.36 · −0.13</div></div>
    <div class="card neg"><div class="cat">ARG</div><div class="val">−0.08</div><div class="avg">AVG −0.05 · −0.03</div></div>
    <div class="card pos"><div class="cat">APP</div><div class="val">+2.28</div><div class="avg">AVG +0.70 · +1.58</div></div>
    <div class="card pos"><div class="cat">OTT</div><div class="val">+0.80</div><div class="avg">AVG +0.16 · +0.64</div></div>
  </div>
</body>
</html>
