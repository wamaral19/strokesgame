<!-- @dsCard group="Components" viewport="700x80" name="Badges" subtitle="Tournament tier chips" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--bg-page); padding: 24px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; font-family: var(--font-ui); }
  .badge { font-family: var(--font-ui); font-size: var(--text-2xs); font-weight: var(--weight-semibold); letter-spacing: var(--tracking-label); text-transform: uppercase; color: var(--text-secondary); border: 1px solid var(--border-strong); border-radius: var(--radius-sm); padding: 3px 8px; white-space: nowrap; line-height: 1; display: inline-block; }
  .pill { background: var(--color-ink-900); color: var(--color-cream-50); border-color: var(--color-ink-900); border-radius: var(--radius-pill); }
</style>
</head>
<body>
  <span class="badge">Playoff</span>
  <span class="badge">Signature</span>
  <span class="badge">Regular</span>
  <span class="badge pill">Complete</span>
  <span class="badge pill" style="background:var(--color-green-700); border-color:var(--color-green-700); color:var(--color-cream-50)">Locked</span>
</body>
</html>
