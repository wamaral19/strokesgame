<!-- @dsCard group="Type" viewport="700x140" name="Numeric Display" subtitle="SG values, positions, currency" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-page); padding: 20px; font-family: var(--font-ui); display: flex; gap: 24px; align-items: flex-end; flex-wrap: wrap; }
  .num { font-family: var(--font-display); font-weight: var(--weight-bold); letter-spacing: var(--tracking-tight); line-height: 1; }
  .label { font-size: 9px; font-weight: 600; letter-spacing: var(--tracking-label); text-transform: uppercase; color: var(--text-muted); margin-top: 4px; }
</style>
</head>
<body>
  <div>
    <div class="num" style="font-size:44px; color:var(--text-positive)">+2.28</div>
    <div class="label">SG card · 44px</div>
  </div>
  <div>
    <div class="num" style="font-size:44px; color:var(--text-negative)">−0.08</div>
    <div class="label">SG card neg · 44px</div>
  </div>
  <div>
    <div class="num" style="font-size:30px; color:var(--text-primary)">T5</div>
    <div class="label">Finish · 30px</div>
  </div>
  <div>
    <div class="num" style="font-size:30px; color:var(--text-primary)">440</div>
    <div class="label">Points · 30px</div>
  </div>
  <div>
    <div class="num" style="font-size:24px; color:var(--text-on-dark); background:var(--bg-banner); padding:8px 14px; border-radius:6px">No. 27</div>
    <div class="label">Banner pos · 24px</div>
  </div>
  <div>
    <div class="num" style="font-size:24px; color:var(--text-on-dark); background:var(--bg-banner); padding:8px 14px; border-radius:6px">$7,216,000</div>
    <div class="label">Banner currency · 24px</div>
  </div>
</body>
</html>
